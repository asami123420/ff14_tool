<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submarine Voyager 自動計時器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #121214; color: #E4E4E7; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4 min-h-screen relative">

    <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
        潛水艇返航 自動計時器
    </h1>
    
    <div class="flex gap-3 mb-6 flex-wrap justify-center">
        <button id="auth-btn" onclick="requestNotificationPermission()" class="border border-zinc-700 bg-zinc-900/50 hover:bg-zinc-800 text-xs px-4 py-2 rounded-lg text-zinc-400 transition flex items-center gap-2">
            🔔 點擊開啟網頁通知提醒功能
        </button>
        <button onclick="playBeepNotification()" class="border border-zinc-700 bg-zinc-900/50 hover:bg-zinc-800 text-xs px-4 py-2 rounded-lg text-zinc-400 transition flex items-center gap-2">
            🔊 測試音效
        </button>
    </div>

    <!-- 主輸入面板 -->
    <div class="w-full max-w-2xl bg-zinc-900/40 border border-zinc-800 rounded-xl p-6 mb-8 space-y-6 shadow-xl">
        <div class="space-y-4">
            <h3 class="text-sm font-bold text-purple-400 flex items-center gap-2">✍️ 新增潛水艇任務計時</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">潛水艇名字</label>
                    <input type="text" id="manual-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500" placeholder="例如：潛水艇-1">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">等級 (Lv)</label>
                    <input type="number" id="manual-level" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500" placeholder="例如：100" min="1" max="100">
                </div>
            </div>

            <div>
                <label class="text-xs text-sky-400 block mb-1 font-bold">🗺️ 選擇熱門航線（自動填入時間與配置提醒）</label>
                <select id="route-preset" onchange="applyRoutePreset('manual-name', 'time-d', 'time-h', 'time-m', 'route-preset')" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-sky-500">
                    <option value="custom">-- 手動輸入時間 / 自訂航線 --</option>
                    <optgroup label="💰 溺沒海（傳統穩定純金幣收益 - 沉船飾品）">
                        <option value="0,21,30,溺沒海 O-J [白板3124]">溺沒海 O -> J (約 21.5 小時) 🌟推薦配置：【白板3124】低成本高收益</option>
                        <option value="0,20,0,溺沒海 O-P [2344流]">溺沒海 O -> P (約 20 小時) 🌟推薦配置：【2344】極速雙撈</option>
                        <option value="1,0,0,溺沒海 M-O-P-R [2344流]">溺沒海 M -> O -> P -> R (約 1 天) 🌟推薦配置：【2344】經典四點</option>
                    </optgroup>
                    <optgroup label="💎 灰海 / 翠浪海（新世代暴利材料與高階沉船）">
                        <option value="1,4,0,灰海 M-N [1544流]">灰海 M -> N (約 1 天 4 小時) ✨推薦配置：【1544】高階純金礦</option>
                        <option value="1,8,30,翠浪海 T-V [1544流]">翠浪海 T -> V (約 1 天 8 小時 30 分) ✨推薦配置：【1544】當前畢業航線</option>
                    </optgroup>
                    <optgroup label="⏱️ 快速測試用">
                        <option value="0,0,1,測試航線（1分鐘快速回港）">測試航線（1 分鐘快速回港測試）</option>
                    </optgroup>
                </select>
            </div>
            
            <div>
                <label class="text-xs text-zinc-400 block mb-1">任務所需時間 / 剩餘時間</label>
                <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded-lg p-2">
                    <input type="number" id="time-d" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-purple-500" placeholder="0" min="0">
                    <span class="text-xs text-zinc-400">天</span>
                    
                    <input type="number" id="time-h" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-purple-500" placeholder="0" min="0" max="23">
                    <span class="text-xs text-zinc-400">小時</span>
                    
                    <input type="number" id="time-m" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-purple-500" placeholder="0" min="0" max="59">
                    <span class="text-xs text-zinc-400">分鐘</span>
                </div>
            </div>

            <button onclick="addManualSubmarine()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white py-2.5 rounded-lg font-bold transition shadow-lg flex items-center justify-center gap-2">
                🚀 新增並開始計時
            </button>
        </div>

        <hr class="border-zinc-800">

        <div class="space-y-3">
            <h3 class="text-sm font-bold text-sky-400 flex items-center gap-2">💾 紀錄檔案備份與管理</h3>
            <div class="flex flex-wrap gap-3">
                <button onclick="exportDataFile()" class="flex-1 min-w-[140px] bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                    📥 匯出紀錄檔案 (.json)
                </button>
                <label class="flex-1 min-w-[140px] bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer text-center">
                    📤 讀取/匯入紀錄檔案
                    <input type="file" id="import-file" accept=".json" onchange="importDataFile(event)" class="hidden">
                </label>
                <button onclick="clearAllRecords()" class="bg-red-955/40 hover:bg-red-900/40 text-red-400 border border-red-900/60 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                    🗑️ 清空所有紀錄
                </button>
            </div>
        </div>
    </div>

    <!-- 潛水艇列表容器 -->
    <div id="submarine-list" class="w-full max-w-2xl space-y-4"></div>

    <!-- 彈出式修改時間視窗 (Modal) -->
    <div id="time-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-md shadow-2xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-base font-bold text-emerald-400 flex items-center gap-2">🔄 設定全新倒數時間</h3>
                <button onclick="closeTimeModal()" class="text-zinc-500 hover:text-white text-lg">✕</button>
            </div>
            <p id="modal-sub-name" class="text-xs text-sky-400 font-medium"></p>
            
            <div>
                <label class="text-xs text-zinc-400 block mb-1">快速套用最新航線</label>
                <select id="modal-route-preset" onchange="applyRoutePreset(null, 'modal-time-d', 'modal-time-h', 'modal-time-m', 'modal-route-preset')" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-zinc-300 focus:outline-none focus:border-emerald-500">
                    <option value="custom">-- 保持手動微調 --</option>
                    <option value="0,21,30,溺沒海 O-J">溺沒海 O -> J (約 21.5 小時) 【白板3124】</option>
                    <option value="0,20,0,溺沒海 O-P">溺沒海 O -> P (約 20 小時) 【2344流】</option>
                    <option value="1,0,0,溺沒海 M-O-P-R">溺沒海 M -> O -> P -> R (約 1 天)</option>
                    <option value="1,8,30,翠浪海 T-V">翠浪海 T -> V (約 1 天 8.5 小時)</option>
                    <option value="0,0,1,測試航線">快速測試航線（1 分鐘）</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-zinc-400 block mb-1">微調新任務時間</label>
                <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded-lg p-2">
                    <input type="number" id="modal-time-d" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white text-sm" placeholder="0" min="0">
                    <span class="text-xs text-zinc-400">天</span>
                    <input type="number" id="modal-time-h" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white text-sm" placeholder="0" min="0" max="23">
                    <span class="text-xs text-zinc-400">小時</span>
                    <input type="number" id="modal-time-m" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white text-sm" placeholder="0" min="0" max="59">
                    <span class="text-xs text-zinc-400">分鐘</span>
                </div>
            </div>

            <input type="hidden" id="modal-target-id">
            <button onclick="submitNewTimeReset()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg font-bold text-sm transition shadow-lg">
                ✅ 確認並重新出航計時
            </button>
        </div>
    </div>

    <script>
        const submarineList = document.getElementById('submarine-list');
        const authBtn = document.getElementById('auth-btn');
        let submarines = JSON.parse(localStorage.getItem('ff14_subs')) || [];

        window.onload = function() {
            checkNotificationStatus();
            renderCards();
            setInterval(updateAllTimers, 1000);
        };

        // 泛用航線預設帶入邏輯
        function applyRoutePreset(nameId, dId, hId, mId, presetId) {
            const select = document.getElementById(presetId);
            if (select.value === 'custom') return;

            const [d, h, m, routeName] = select.value.split(',');
            document.getElementById(dId).value = d;
            document.getElementById(hId).value = h;
            document.getElementById(mId).value = m;

            if (nameId) {
                const nameInput = document.getElementById(nameId);
                if (!nameInput.value.trim()) {
                    nameInput.value = routeName.split(' [')[0]; 
                }
            }
        }

        // 大音量合成提示音
        function playBeepNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.15].forEach((delay) => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + delay);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + delay); 
                    gainNode.gain.exponentialRampToValueAtTime(0.05, audioCtx.currentTime + delay + 0.1);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start(audioCtx.currentTime + delay);
                    oscillator.stop(audioCtx.currentTime + delay + 0.12);
                });
            } catch (e) { console.log("音效播放被阻擋"); }
        }

        function checkNotificationStatus() {
            if (!("Notification" in window)) {
                authBtn.innerText = "❌ 您的瀏覽器不支援網頁通知功能";
                authBtn.disabled = true;
            } else if (Notification.permission === "granted") {
                authBtn.innerText = "🟢 網頁通知提醒功能已成功開啟";
                authBtn.className = "border border-emerald-800 bg-emerald-950/30 text-xs px-4 py-2 rounded-lg text-emerald-400 font-medium cursor-default";
                authBtn.onclick = null;
            }
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    checkNotificationStatus();
                    new Notification("Submarine Voyager 計時器", { body: "測試通知：成功開啟潛水艇回港提醒！" });
                }
            });
        }

        function addManualSubmarine() {
            const nameInput = document.getElementById('manual-name').value.trim();
            const levelInput = document.getElementById('manual-level').value.trim();
            const d = parseInt(document.getElementById('time-d').value || 0, 10);
            const h = parseInt(document.getElementById('time-h').value || 0, 10);
            const m = parseInt(document.getElementById('time-m').value || 0, 10);

            const select = document.getElementById('route-preset');
            let routeTag = "";
            if (select.value !== 'custom') {
                const parts = select.value.split(',');
                if(!nameInput.includes(parts[3])) { routeTag = ` (${parts[3]})`; }
            }

            if (!nameInput) { alert("請輸入潛水艇名字！"); return; }

            const totalSeconds = (d * 24 * 3600) + (h * 3600) + (m * 60);
            if (totalSeconds <= 0) { alert("請設定大於 0 分鐘的倒數時間！"); return; }

            const now = new Date();
            const targetTime = new Date(now.getTime() + totalSeconds * 1000);
            const levelStr = levelInput ? ` [Lv.${levelInput}]` : '';

            submarines.push({
                id: Date.now() + Math.random(),
                name: nameInput + levelStr + routeTag,
                endTime: targetTime.getTime(), 
                startTimeStr: formatTime(now),
                endTimeStr: formatTime(targetTime),
                maxDuration: totalSeconds,
                notified: false
            });

            saveToStorage(); renderCards();
            document.getElementById('manual-name').value = '';
            document.getElementById('manual-level').value = '';
            document.getElementById('time-d').value = '';
            document.getElementById('time-h').value = '';
            document.getElementById('time-m').value = '';
            select.value = 'custom';
        }

        // 一鍵按鈕：原時間重置
        window.resetSubmarineTimer = function(id) {
            const idx = submarines.findIndex(sub => sub.id === id);
            if (idx === -1) return;
            executeReset(idx, submarines[idx].maxDuration);
        };

        // 打開彈出視窗：修改全新時間重置
        window.openCustomTimeModal = function(id) {
            const sub = submarines.find(s => s.id === id);
            if (!sub) return;

            document.getElementById('modal-target-id').value = id;
            document.getElementById('modal-sub-name').innerText = `正在為【${sub.name}】設定新一輪航行時間`;
            document.getElementById('modal-route-preset').value = 'custom';
            
            // 預填原本倒數時間方便微調
            const rem = sub.maxDuration;
            document.getElementById('modal-time-d').value = Math.floor(rem / (24 * 3600));
            document.getElementById('modal-time-h').value = Math.floor((rem % (24 * 3600)) / 3600);
            document.getElementById('modal-time-m').value = Math.floor((rem % 3600) / 60);

            document.getElementById('time-modal').classList.remove('hidden');
        };

        function closeTimeModal() {
            document.getElementById('time-modal').classList.add('hidden');
        }

        // 確認並遞交全新時間重新倒數
        function submitNewTimeReset() {
            const id = parseFloat(document.getElementById('modal-target-id').value);
            const idx = submarines.findIndex(sub => sub.id === id);
            if (idx === -1) return;

            const d = parseInt(document.getElementById('modal-time-d').value || 0, 10);
            const h = parseInt(document.getElementById('modal-time-h').value || 0, 10);
            const m = parseInt(document.getElementById('modal-time-m').value || 0, 10);
            const totalSeconds = (d * 24 * 3600) + (h * 3600) + (m * 60);

            if (totalSeconds <= 0) { alert("時間不可為0！"); return; }

            // 如果選取了新的預設航線，順便幫名字後面更新括號標記
            const select = document.getElementById('modal-route-preset');
            if (select.value !== 'custom') {
                const parts = select.value.split(',');
                let baseName = submarines[idx].name.split(' (')[0]; // 取出乾淨的原名
                submarines[idx].name = `${baseName} (${parts[3]})`;
            }

            executeReset(idx, totalSeconds);
            closeTimeModal();
        }

        // 執行更新核心
        function executeReset(index, totalSeconds) {
            const now = new Date();
            const targetTime = new Date(now.getTime() + totalSeconds * 1000);

            submarines[index].endTime = targetTime.getTime();
            submarines[index].startTimeStr = formatTime(now);
            submarines[index].endTimeStr = formatTime(targetTime);
            submarines[index].maxDuration = totalSeconds; // 更新記憶秒數
            submarines[index].notified = false;

            saveToStorage(); renderCards();
        }

        function exportDataFile() {
            if (submarines.length === 0) { alert("目前沒有任何紀錄！"); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ exportTime: Date.now(), submarines: submarines }, null, 4));
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStr);
            anchor.setAttribute("download", `FF14_Submarines_Backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(anchor); anchor.click(); anchor.remove();
        }

        function importDataFile(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.submarines) return alert("格式錯誤！");
                    const processed = data.submarines.map(sub => ({ ...sub, id: Date.now() + Math.random(), notified: sub.endTime <= Date.now() ? true : false }));
                    submarines = confirm("是否覆蓋現有紀錄？") ? processed : [...submarines, ...processed];
                    saveToStorage(); renderCards();
                } catch (err) { alert("讀取失敗！"); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function saveToStorage() { localStorage.setItem('ff14_subs', JSON.stringify(submarines)); }

        function formatTime(date) {
            return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
        }

        function formatDuration(seconds) {
            if (seconds <= 0) return "00:00:00";
            const days = Math.floor(seconds / (24 * 3600));
            let rem = seconds % (24 * 3600);
            const h = Math.floor(rem / 3600).toString().padStart(2, '0');
            const m = Math.floor((rem % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(rem % 60).toString().padStart(2, '0');
            return days > 0 ? `${days}天 ${h}:${m}:${s}` : `${h}:${m}:${s}`;
        }

        function renderCards() {
            if (submarines.length === 0) {
                submarineList.innerHTML = `<div class="text-center text-zinc-500 py-4">目前沒有任何計時中的潛水艇，請在上方新增。</div>`;
                return;
            }
            submarineList.innerHTML = '';
            submarines.forEach(sub => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-5 flex flex-col justify-between shadow-lg relative";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span id="name-display-${sub.id}" onclick="enableNameEdit(${sub.id}, '${sub.name.replace(/'/g, "\\'")}')" class="text-sky-400 font-bold text-lg cursor-pointer hover:text-sky-300 border-b border-dashed border-sky-400/50" title="點擊修改名字">${sub.name}</span>
                        <span class="text-orange-400 font-mono font-bold text-xl" id="timer-${sub.id}">--:--:--</span>
                    </div>
                    <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden mb-4">
                        <div id="progress-${sub.id}" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full w-full transition-all duration-1000"></div>
                    </div>
                    <div class="flex justify-between items-end text-sm">
                        <div class="text-zinc-400 space-y-1">
                            <div>出航時間：<span class="text-zinc-300 font-mono">${sub.startTimeStr}</span></div>
                            <div>預計回港：<span class="text-amber-400 font-mono">${sub.endTimeStr}</span></div>
                        </div>
                        <div class="flex gap-1.5 items-center">
                            <!-- 升級：全新複合式重新計時按鈕組（僅在回港時浮現） -->
                            <div id="reset-group-${sub.id}" class="hidden flex items-center bg-emerald-950/40 border border-emerald-800/80 rounded-lg overflow-hidden">
                                <button onclick="resetSubmarineTimer(${sub.id})" class="text-emerald-400 hover:bg-emerald-900/30 text-xs px-2.5 py-1.5 transition font-semibold border-r border-emerald-800/60" title="直接原時間一鍵重新計時">
                                    🔄 重置
                                </button>
                                <button onclick="openCustomTimeModal(${sub.id})" class="text-emerald-400 hover:bg-emerald-900/30 text-xs px-1.5 py-1.5 transition font-bold" title="輸入全新時間重新計時">
                                    ▽
                                </button>
                            </div>
                            <button onclick="deleteRecord(${sub.id})" class="border border-zinc-700 hover:bg-zinc-800 text-red-400 text-xs px-3 py-1.5 rounded transition">刪除記錄</button>
                        </div>
                    </div>
                `;
                submarineList.appendChild(card);
            });
            updateAllTimers();
        }

        function updateAllTimers() {
            const now = Date.now();
            submarines.forEach(sub => {
                const timerEl = document.getElementById(`timer-${sub.id}`);
                const progressEl = document.getElementById(`progress-${sub.id}`);
                const resetGroupEl = document.getElementById(`reset-group-${sub.id}`);
                if (!timerEl) return;
                const remainSeconds = Math.ceil((sub.endTime - now) / 1000);
                if (remainSeconds <= 0) {
                    timerEl.innerText = "已回港";
                    timerEl.className = "text-green-400 font-bold text-xl";
                    if (progressEl) progressEl.style.width = "0%";
                    if (resetGroupEl) resetGroupEl.classList.remove('hidden');
                    if (!sub.notified) {
                        sub.notified = true;
                        saveToStorage(); triggerNotification(sub.name);
                    }
                } else {
                    timerEl.innerText = formatDuration(remainSeconds);
                    timerEl.className = "text-orange-400 font-mono font-bold text-xl";
                    if (progressEl) {
                        const pct = Math.max(0, Math.min(100, (remainSeconds / sub.maxDuration) * 100));
                        progressEl.style.width = `${pct}%`;
                    }
                    if (resetGroupEl) resetGroupEl.classList.add('hidden');
                }
            });
        }

        function triggerNotification(subName) {
            playBeepNotification();
            if (Notification.permission === "granted") {
                new Notification("⚓ FFXIV 潛水艇回港提醒", { body: `您的潛水艇【${subName}】已經探索完畢，成功回港囉！` });
            }
        }

        window.enableNameEdit = function(id, currentName) {
            const nameDisplay = document.getElementById(`name-display-${id}`);
            if (!nameDisplay) return;
            nameDisplay.innerHTML = `<input type="text" id="name-input-${id}" class="bg-zinc-800 text-white font-bold text-base px-2 py-0.5 rounded border border-purple-500 focus:outline-none w-48" value="${currentName}" onblur="saveName(${id})" onkeydown="if(event.key === 'Enter') saveName(${id})">`;
            const input = document.getElementById('name-input-' + id);
            input.focus(); input.select();
            input.addEventListener('click', (e) => e.stopPropagation());
        }

        window.saveName = function(id) {
            const input = document.getElementById('name-input-' + id);
            if (!input) return;
            const newName = input.value.trim() || "未命名潛水艇";
            const subIndex = submarines.findIndex(sub => sub.id === id);
            if (subIndex !== -1) submarines[subIndex].name = newName;
            saveToStorage(); renderCards();
        }

        window.deleteRecord = function(id) { submarines = submarines.filter(sub => sub.id !== id); saveToStorage(); renderCards(); }
        window.clearAllRecords = function() { if (submarines.length === 0) return; if (confirm("⚠️ 確定要清空所有紀錄嗎？")) { submarines = []; saveToStorage(); renderCards(); } }
    </script>
</body>
</html>
