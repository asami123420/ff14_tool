<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submerge DiveClock 自動計時器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 透過給 body 加上 .light-mode 類別來動態切換白底色系 */
        body { background-color: #0d1112; color: #E4E4E7; font-family: sans-serif; transition: background-color 0.2s, color 0.2s; }
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4 min-h-screen relative">

    <button onclick="toggleTheme()" class="fixed top-4 right-4 z-50 bg-zinc-900/80 hover:bg-zinc-800 text-zinc-300 border border-zinc-700/60 text-xs px-3 py-2 rounded-xl shadow-lg transition flex items-center gap-1.5 cursor-pointer dark-mode-btn">
        🌓 切換亮暗配色
    </button>

    <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-500 to-cyan-500 bg-clip-text text-transparent mb-4">
        潛水艇返航 自動計時器
    </h1>
    
    <div id="top-ctrl-panel" class="w-full max-w-2xl bg-zinc-900/30 border border-zinc-800/80 rounded-xl p-4 mb-6 flex flex-wrap items-center justify-center lg:justify-between gap-4 shadow-md">
        
        <div class="flex flex-wrap gap-2.5 items-center justify-center">
            <button id="auth-btn" onclick="requestNotificationPermission()" class="border border-emerald-900/60 bg-emerald-950/20 hover:bg-emerald-900/30 text-xs px-4 py-2 rounded-lg text-emerald-400 transition flex items-center gap-2">
                🔔 點擊開啟網頁通知提醒功能
            </button>
            <button id="test-sound-btn" onclick="playBeepNotification()" class="border border-zinc-700/40 bg-zinc-900/30 text-xs px-3 py-2 rounded-lg text-zinc-400 transition flex items-center gap-1.5 hover:bg-zinc-800/30 cursor-pointer whitespace-nowrap">
                🔊 測試音效
            </button>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4 flex-1 sm:flex-none">
            <div class="flex items-center gap-1.5">
                <select id="sound-type-preset" onchange="saveSoundSettings()" class="bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1.5 text-xs text-zinc-300 focus:outline-none focus:border-emerald-500 theme-input text-ellipsis overflow-hidden max-w-[180px] sm:max-w-none">
                    <option value="standard">📡 標準雷達嗶嗶聲</option>
                    <option value="alarm">🚨 緊急回港警報音</option>
                    <option value="sonar">🎵 深海探測聲 Sonar</option>
                </select>
            </div>
        </div>

    </div>

    <div id="main-panel-box" class="w-full max-w-2xl bg-zinc-900/30 border border-zinc-800/80 rounded-xl p-6 mb-8 space-y-6 shadow-xl">
        <div class="space-y-4">
            <h3 class="text-sm font-bold text-emerald-500 flex items-center gap-2 theme-title-main">✍️ 新增潛水艇任務計時</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-medium theme-label">潛水艇名字</label>
                    <input type="text" id="manual-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 theme-input" placeholder="例如：潛水艇-1">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-medium theme-label">等級 (Lv)</label>
                    <input type="number" id="manual-level" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 theme-input" placeholder="example：100" min="1" max="100">
                </div>
            </div>

            <div>
                <label class="text-xs text-cyan-500 block mb-1 font-bold theme-title-cyan">🗺️ 選擇熱門航線（自動填入時間與配置提醒）</label>
                <select id="route-preset" onchange="applyRoutePreset('manual-name', 'time-d', 'time-h', 'time-m', 'route-preset')" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:border-cyan-500 theme-input">
                    <option value="custom">-- 手動輸入時間 / 自訂航線 --</option>
                    <optgroup label="💰 溺沒海（傳統穩定純金幣收益 - 沉船飾品）" class="theme-optgroup">
                        <option value="0,21,30,溺沒海 O-J [白板3124]">溺沒海 O -> J (約 21.5 小時) 🌟推薦配置：【白板3124】低成本高收益</option>
                        <option value="0,20,0,溺沒海 O-P [2344流]">溺沒海 O -> P (約 20 小時) 🌟推薦配置：【2344】極速雙撈</option>
                        <option value="1,0,0,溺沒海 M-O-P-R [2344流]">溺沒海 M -> O -> P -> R (約 1 天) 🌟推薦配置：【2344】經典四點</option>
                    </optgroup>
                    <optgroup label="💎 灰海 / 翠浪海（新世代暴利材料與高階沉船）" class="theme-optgroup">
                        <option value="1,4,0,灰海 M-N [1544流]">灰海 M -> N (約 1 天 4 小時) ✨推薦配置：【1544】高階純金礦</option>
                        <option value="1,8,30,翠浪海 T-V [1544流]">翠浪海 T -> V (約 1 天 8 小時 30 分) ✨推薦配置：【1544】當前畢業航線</option>
                    </optgroup>
                    <optgroup label="⏱️ 快速測試用" class="theme-optgroup">
                        <option value="0,0,1,測試航線（1分鐘快速回港）">測試航線（1 分鐘快速回港測試）</option>
                    </optgroup>
                </select>
            </div>
            
            <div>
                <label class="text-xs text-zinc-400 block mb-1 font-medium theme-label">任務所需時間 / 剩餘時間</label>
                <div class="flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded-lg p-2 theme-input-box">
                    <input type="number" id="time-d" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-emerald-500 theme-inner-input" placeholder="0" min="0">
                    <span class="text-xs text-zinc-400 font-medium theme-label">天</span>
                    
                    <input type="number" id="time-h" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-emerald-500 theme-inner-input" placeholder="0" min="0" max="23">
                    <span class="text-xs text-zinc-400 font-medium theme-label">小時</span>
                    
                    <input type="number" id="time-m" class="w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-emerald-500 theme-inner-input" placeholder="0" min="0" max="59">
                    <span class="text-xs text-zinc-400 font-medium theme-label">分鐘</span>
                </div>
            </div>

            <button onclick="addManualSubmarine()" class="w-full bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white py-2.5 rounded-lg font-bold transition shadow-lg flex items-center justify-center gap-2 cursor-pointer">
                🚀 新增並開始計時
            </button>
        </div>

        <hr class="border-zinc-800/60 theme-hr">

        <div class="space-y-3">
            <h3 class="text-sm font-bold text-cyan-500 flex items-center gap-2 theme-title-cyan">💾 紀錄檔案備份與管理</h3>
            <div class="flex flex-wrap gap-3">
                <button onclick="exportDataFile()" class="flex-1 min-w-[140px] bg-zinc-800/80 hover:bg-zinc-700 text-zinc-200 border border-zinc-700/60 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer theme-util-btn">
                    📥 匯出紀錄檔案 (.json)
                </button>
                <label class="flex-1 min-w-[140px] bg-zinc-800/80 hover:bg-zinc-700 text-zinc-200 border border-zinc-700/60 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer text-center theme-util-btn">
                    📤 讀取/匯入紀錄檔案
                    <input type="file" id="import-file" accept=".json" onchange="importDataFile(event)" class="hidden">
                </label>
                <button onclick="clearAllRecords()" class="bg-red-955/20 hover:bg-red-900/30 text-red-400 border border-red-900/40 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer">
                    🗑️ 清空所有紀錄
                </button>
            </div>
        </div>
    </div>

    <div id="submarine-list" class="w-full max-w-2xl space-y-4"></div>

    <div id="time-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-md shadow-2xl space-y-4 theme-modal-box">
            <div class="flex justify-between items-center">
                <h3 class="text-base font-bold text-emerald-400 flex items-center gap-2 theme-modal-title">🔄 設定全新倒數時間</h3>
                <button onclick="closeTimeModal()" class="text-zinc-500 hover:text-white text-lg cursor-pointer theme-modal-close">✕</button>
            </div>
            <p id="modal-sub-name" class="text-xs text-cyan-500 font-medium theme-title-cyan"></p>
            
            <div>
                <label class="text-xs text-zinc-400 block mb-1 font-medium theme-label">快速套用最新航線</label>
                <select id="modal-route-preset" onchange="applyRoutePreset(null, 'modal-time-d', 'modal-time-h', 'modal-time-m', 'modal-route-preset')" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-zinc-300 focus:outline-none focus:border-emerald-500 theme-input">
                    <option value="custom">-- 保持手動微調 --</option>
                    <option value="0,21,30,溺沒海 O-J">溺沒海 O -> J (約 21.5 小時) 【白板3124】</option>
                    <option value="0,20,0,溺沒海 O-P">溺沒海 O -> P (約 20 小時) 【2344流】</option>
                    <option value="1,0,0,溺沒海 M-O-P-R">溺沒海 M -> O -> P -> R (約 1 天)</option>
                    <option value="1,8,30,翠浪海 T-V">翠浪海 T -> V (約 1 天 8.5 小時)</option>
                    <option value="0,0,1,測試航線">快速測試航線（1 分鐘）</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-zinc-400 block mb-1 font-medium theme-label">微調新任務時間</label>
                <div class="flex items-center gap-2 bg-zinc-950 border border-slate-300 rounded-xl p-2">
                    <input type="number" id="modal-time-d" class="w-16 bg-white text-slate-900 text-sm focus:outline-none focus:border-emerald-500" placeholder="0" min="0">
                    <span class="text-xs text-zinc-400">天</span>
                    <input type="number" id="modal-time-h" class="w-16 bg-white text-slate-900 text-sm focus:outline-none focus:border-emerald-500" placeholder="0" min="0" max="23">
                    <span class="text-xs text-zinc-400">小時</span>
                    <input type="number" id="modal-time-m" class="w-16 bg-white text-slate-900 text-sm focus:outline-none focus:border-emerald-500" placeholder="0" min="0" max="59">
                    <span class="text-xs text-zinc-400">分鐘</span>
                </div>
            </div>

            <input type="hidden" id="modal-target-id">
            <button onclick="submitNewTimeReset()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white py-2 rounded-lg font-bold text-sm transition shadow-lg cursor-pointer">
                ✅ 確認並重新出航計時
            </button>
        </div>
    </div>

    <script>
        const submarineList = document.getElementById('submarine-list');
        const authBtn = document.getElementById('auth-btn');
        let submarines = JSON.parse(localStorage.getItem('ff14_subs')) || [];

        window.onload = function() {
            const savedTheme = localStorage.getItem('sub_theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                updateThemeStyles('light');
            } else {
                updateThemeStyles('dark');
            }

            // 讀取本地快取的音效設定
            const savedSoundType = localStorage.getItem('sub_sound_type') || 'standard';
            document.getElementById('sound-type-preset').value = savedSoundType;

            checkNotificationStatus();
            renderCards();
            setInterval(updateAllTimers, 1000);
        };

        function saveSoundSettings() {
            const soundType = document.getElementById('sound-type-preset').value;
            localStorage.setItem('sub_sound_type', soundType);
            playBeepNotification(); 
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            const newTheme = isLight ? 'light' : 'dark';
            localStorage.setItem('sub_theme', newTheme);
            updateThemeStyles(newTheme);
            renderCards(); 
        }

        function updateThemeStyles(theme) {
            const ctrlPanel = document.getElementById('top-ctrl-panel');
            const mainPanel = document.getElementById('main-panel-box');
            const labels = document.querySelectorAll('.theme-label');
            const inputs = document.querySelectorAll('.theme-input');
            const inputBoxes = document.querySelectorAll('.theme-input-box');
            const innerInputs = document.querySelectorAll('.theme-inner-input');
            const titleMains = document.querySelectorAll('.theme-title-main');
            const titleCyans = document.querySelectorAll('.theme-title-cyan');
            const hrs = document.querySelectorAll('.theme-hr');
            const utilBtns = document.querySelectorAll('.theme-util-btn');
            const toggleBtn = document.querySelector('.dark-mode-btn');
            const modalBox = document.querySelector('.theme-modal-box');
            const modalClose = document.querySelector('.theme-modal-close');
            const modalTitle = document.querySelector('.theme-modal-title');
            const optgroups = document.querySelectorAll('.theme-optgroup');
            const testSoundBtn = document.getElementById('test-sound-btn');

            // 🎨 【你可以修改這裡】自訂亮色模式下兩個主面板的背景色樣式
            // 如果你想改成純白，請將 'bg-white' 改為你想換的 Tailwind 色碼（例如 'bg-amber-50' 或 'bg-zinc-100'）
            const lightModeBgClass = "w-full max-w-2xl bg-white border border-slate-200 rounded-xl shadow-md";

            if (theme === 'light') {
                if (toggleBtn) toggleBtn.className = "fixed top-4 right-4 z-50 bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 text-xs px-3 py-2 rounded-xl shadow-md transition flex items-center gap-1.5 cursor-pointer dark-mode-btn";
                if (modalBox) modalBox.className = "bg-white border border-slate-300 rounded-xl p-6 w-full max-w-md shadow-2xl space-y-4 theme-modal-box";
                if (modalClose) modalClose.className = "text-slate-400 hover:text-slate-800 text-lg cursor-pointer theme-modal-close";
                if (modalTitle) modalTitle.className = "text-base font-bold text-slate-800 flex items-center gap-2 theme-modal-title";
                
                // 動態刷新亮色背景
                if (ctrlPanel) ctrlPanel.className = `${lightModeBgClass} p-4 flex flex-wrap items-center justify-center lg:justify-between gap-4`;
                if (mainPanel) mainPanel.className = `${lightModeBgClass} p-6 mb-8 space-y-6`;
                if (testSoundBtn) testSoundBtn.className = "border border-slate-300 bg-slate-50 text-xs px-4 py-2 rounded-lg text-slate-700 transition flex items-center gap-2 hover:bg-slate-200/60 cursor-pointer";
                
                labels.forEach(l => l.className = "text-xs text-slate-700 font-bold block mb-1 theme-label");
                titleMains.forEach(t => t.className = "text-sm font-bold text-slate-800 flex items-center gap-2 theme-title-main");
                titleCyans.forEach(t => t.className = "text-sm font-bold text-blue-700 flex items-center gap-2 theme-title-cyan");
                hrs.forEach(h => h.className = "border-slate-200 theme-hr");
                optgroups.forEach(o => o.className = "bg-white text-slate-900 theme-optgroup");
                utilBtns.forEach(b => b.className = "flex-1 min-w-[140px] bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer theme-util-btn");
                inputs.forEach(i => i.className = "w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-blue-600 font-medium theme-input");
                inputBoxes.forEach(ib => ib.className = "flex items-center gap-2 bg-white border border-slate-300 rounded-lg p-2 theme-input-box");
                innerInputs.forEach(ii => ii.className = "w-16 bg-slate-50 border border-slate-300 rounded text-center py-1 text-slate-900 font-medium focus:outline-none focus:border-blue-600 theme-inner-input");
            } else {
                if (toggleBtn) toggleBtn.className = "fixed top-4 right-4 z-50 bg-zinc-900/80 hover:bg-zinc-800 text-zinc-300 border border-zinc-700/60 text-xs px-3 py-2 rounded-xl shadow-lg transition flex items-center gap-1.5 cursor-pointer dark-mode-btn";
                if (modalBox) modalBox.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-md shadow-2xl space-y-4 theme-modal-box";
                if (modalClose) modalClose.className = "text-zinc-500 hover:text-white text-lg cursor-pointer theme-modal-close";
                if (modalTitle) modalTitle.className = "text-base font-bold text-emerald-400 flex items-center gap-2 theme-modal-title";
                if (ctrlPanel) ctrlPanel.className = "w-full max-w-2xl bg-zinc-900/30 border border-zinc-800/80 rounded-xl p-4 flex flex-wrap items-center justify-center lg:justify-between gap-4 shadow-xl";
                if (mainPanel) mainPanel.className = "w-full max-w-2xl bg-zinc-900/30 border border-zinc-800/80 rounded-xl p-6 mb-8 space-y-6 shadow-xl";
                if (testSoundBtn) testSoundBtn.className = "border border-zinc-700/40 bg-zinc-900/30 text-xs px-4 py-2 rounded-lg text-zinc-400 transition flex items-center gap-2 hover:bg-zinc-800/30 cursor-pointer";

                labels.forEach(l => l.className = "text-xs text-zinc-400 block mb-1 theme-label");
                titleMains.forEach(t => t.className = "text-sm font-bold text-emerald-400 flex items-center gap-2 theme-title-main");
                titleCyans.forEach(t => t.className = "text-sm font-bold text-cyan-400 flex items-center gap-2 theme-title-cyan");
                hrs.forEach(h => h.className = "border-zinc-800 theme-hr");
                optgroups.forEach(o => o.className = "bg-zinc-950 text-white theme-optgroup");
                utilBtns.forEach(b => b.className = "flex-1 min-w-[140px] bg-zinc-800/80 hover:bg-zinc-700 text-zinc-200 border border-zinc-700/60 py-2 px-4 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 cursor-pointer theme-util-btn");
                inputs.forEach(i => i.className = "w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 theme-input");
                inputBoxes.forEach(ib => ib.className = "flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded-lg p-2 theme-input-box");
                innerInputs.forEach(ii => ii.className = "w-16 bg-zinc-900 border border-zinc-700 rounded text-center py-1 text-white focus:outline-none focus:border-emerald-500 theme-inner-input");
            }
        }

        function applyRoutePreset(nameId, dId, hId, mId, presetId) {
            const select = document.getElementById(presetId);
            if (select.value === 'custom') return;
            const [d, h, m, routeName] = select.value.split(',');
            document.getElementById(dId).value = d;
            document.getElementById(hId).value = h;
            document.getElementById(mId).value = m;
            if (nameId) {
                const nameInput = document.getElementById(nameId);
                if (!nameInput.value.trim()) { nameInput.value = routeName.split(' [')[0]; }
            }
        }

        function playBeepNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const soundType = document.getElementById('sound-type-preset').value;

                if (soundType === 'standard') {
                    [0, 0.15].forEach((delay) => {
                        const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                        oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + delay);
                        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + delay); gainNode.gain.exponentialRampToValueAtTime(0.05, audioCtx.currentTime + delay + 0.1);
                        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                        oscillator.start(audioCtx.currentTime + delay); oscillator.stop(audioCtx.currentTime + delay + 0.12);
                    });
                } else if (soundType === 'alarm') {
                    [0, 0.12, 0.24, 0.36].forEach((delay) => {
                        const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                        oscillator.type = 'square'; oscillator.frequency.setValueAtTime(660, audioCtx.currentTime + delay);
                        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime + delay); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.08);
                        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                        oscillator.start(audioCtx.currentTime + delay); oscillator.stop(audioCtx.currentTime + delay + 0.09);
                    });
                } else if (soundType === 'sonar') {
                    const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(1100, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1050, audioCtx.currentTime + 0.4);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                    oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                    oscillator.start(audioCtx.currentTime); oscillator.stop(audioCtx.currentTime + 0.8);
                }
            } catch (e) { console.log("音效播放被阻擋"); }
        }

        function checkNotificationStatus() {
            if (!("Notification" in window)) {
                authBtn.innerText = "❌ 您的瀏覽器不支援網頁通知功能"; authBtn.disabled = true;
            } else if (Notification.permission === "granted") {
                authBtn.innerText = "🟢 網頁通知提醒功能已成功開啟";
                authBtn.className = "border border-emerald-800 bg-emerald-950/20 text-xs px-4 py-2 rounded-lg text-emerald-400 font-medium cursor-default";
                authBtn.onclick = null;
            }
        }

        function requestNotificationPermission() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(permission => {
                checkNotificationStatus();
                if (permission === "granted") { new Notification("Submerge DiveClock", { body: "成功開啟網頁通知與潛水艇回港提醒功能！" }); }
            });
        }

        function addManualSubmarine() {
            const nameInput = document.getElementById('manual-name').value.trim();
            const levelInput = document.getElementById('manual-level').value.trim();
            const d = parseInt(document.getElementById('time-d').value || 0, 10);
            const h = parseInt(document.getElementById('time-h').value || 0, 10);
            const m = parseInt(document.getElementById('time-m').value || 0, 10);
            const select = document.getElementById('route-preset');
            let routeTag = "";
            if (select.value !== 'custom') {
                const parts = select.value.split(',');
                if(!nameInput.includes(parts[3])) { routeTag = ` (${parts[3]})`; }
            }
            if (!nameInput) { alert("請輸入潛水艇名字！"); return; }
            const totalSeconds = (d * 24 * 3600) + (h * 3600) + (m * 60);
            if (totalSeconds <= 0) { alert("請設定大於 0 分鐘的倒數時間！"); return; }
            const now = new Date();
            const targetTime = new Date(now.getTime() + totalSeconds * 1000);
            const levelStr = levelInput ? ` [Lv.${levelInput}]` : '';

            submarines.push({
                id: Date.now() + Math.random(),
                name: nameInput + levelStr + routeTag,
                endTime: targetTime.getTime(), 
                startTimeStr: formatTime(now),
                endTimeStr: formatTime(targetTime),
                maxDuration: totalSeconds,
                notified: false
            });
            saveToStorage(); renderCards();
            document.getElementById('manual-name').value = ''; document.getElementById('manual-level').value = '';
            document.getElementById('time-d').value = ''; document.getElementById('time-h').value = ''; document.getElementById('time-m').value = '';
            select.value = 'custom';
        }

        window.resetSubmarineTimer = function(id) {
            const idx = submarines.findIndex(sub => sub.id === id);
            if (idx === -1) return;
            executeReset(idx, submarines[idx].maxDuration);
        };

        window.openCustomTimeModal = function(id) {
            const sub = submarines.find(s => s.id === id);
            if (!sub) return;
            document.getElementById('modal-target-id').value = id;
            document.getElementById('modal-sub-name').innerText = `正在為【${sub.name}】設定新一輪航行時間`;
            document.getElementById('modal-route-preset').value = 'custom';
            const rem = sub.maxDuration;
            document.getElementById('modal-time-d').value = Math.floor(rem / (24 * 3600));
            document.getElementById('modal-time-h').value = Math.floor((rem % (24 * 3600)) / 3600);
            document.getElementById('modal-time-m').value = Math.floor((rem % 3600) / 60);
            document.getElementById('time-modal').classList.remove('hidden');
        };

        function closeTimeModal() { document.getElementById('time-modal').classList.add('hidden'); }

        function submitNewTimeReset() {
            const id = parseFloat(document.getElementById('modal-target-id').value);
            const idx = submarines.findIndex(sub => sub.id === id);
            if (idx === -1) return;
            const d = parseInt(document.getElementById('modal-time-d').value || 0, 10);
            const h = parseInt(document.getElementById('modal-time-h').value || 0, 10);
            const m = parseInt(document.getElementById('modal-time-m').value || 0, 10);
            const totalSeconds = (d * 24 * 3600) + (h * 3600) + (m * 60);
            if (totalSeconds <= 0) { alert("時間不可為0！"); return; }
            const select = document.getElementById('modal-route-preset');
            if (select.value !== 'custom') {
                const parts = select.value.split(',');
                let baseName = submarines[idx].name.split(' (')[0]; 
                submarines[idx].name = `${baseName} (${parts[3]})`;
            }
            executeReset(idx, totalSeconds); closeTimeModal();
        }

        function executeReset(index, totalSeconds) {
            const now = new Date(); const targetTime = new Date(now.getTime() + totalSeconds * 1000);
            submarines[index].endTime = targetTime.getTime();
            submarines[index].startTimeStr = formatTime(now); submarines[index].endTimeStr = formatTime(targetTime);
            submarines[index].maxDuration = totalSeconds; submarines[index].notified = false;
            saveToStorage(); renderCards();
        }

        function exportDataFile() {
            if (submarines.length === 0) { alert("目前沒有任何紀錄！"); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ exportTime: Date.now(), submarines: submarines }, null, 4));
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStr); anchor.setAttribute("download", `FF14_Submarines_Backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(anchor); anchor.click(); anchor.remove();
        }

        function importDataFile(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.submarines) return alert("格式錯誤！");
                    const processed = data.submarines.map(sub => ({ ...sub, id: Date.now() + Math.random(), notified: sub.endTime <= Date.now() ? true : false }));
                    submarines = confirm("是否覆蓋現有紀錄？") ? processed : [...submarines, ...processed];
                    saveToStorage(); renderCards();
                } catch (err) { alert("讀取失敗！"); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function saveToStorage() { localStorage.setItem('ff14_subs', JSON.stringify(submarines)); }
        function formatTime(date) { return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`; }

        function formatDuration(seconds) {
            if (seconds <= 0) return "00:00:00";
            const days = Math.floor(seconds / (24 * 3600)); let rem = seconds % (24 * 3600);
            return days > 0 ? `${days}天 ${Math.floor(rem / 3600).toString().padStart(2, '0')}:${Math.floor((rem % 3600) / 60).toString().padStart(2, '0')}:${Math.floor(rem % 60).toString().padStart(2, '0')}` : `${Math.floor(rem / 3600).toString().padStart(2, '0')}:${Math.floor((rem % 3600) / 60).toString().padStart(2, '0')}:${Math.floor(rem % 60).toString().padStart(2, '0')}`;
        }

        function renderCards() {
            if (submarines.length === 0) {
                submarineList.innerHTML = `<div class="text-center text-slate-400 py-4 font-medium">目前沒有任何計時中的潛水艇，請在上方新增。</div>`;
                return;
            }
            submarineList.innerHTML = '';
            const isLight = document.body.classList.contains('light-mode');
            
            submarines.forEach(sub => {
                const card = document.createElement('div');
                card.className = isLight 
                    ? "w-full max-w-2xl bg-white border border-slate-200 rounded-xl p-5 flex flex-col justify-between shadow-md relative text-slate-800"
                    : "w-full max-w-2xl bg-zinc-900 border border-zinc-800/80 rounded-xl p-5 flex flex-col justify-between shadow-lg relative text-zinc-300";
                
                const nameColor = isLight ? "text-blue-900 hover:text-blue-700 border-blue-900/30" : "text-cyan-400 hover:text-cyan-300 border-cyan-400/30";
                const textTimeColor = isLight ? "text-slate-600 font-medium" : "text-zinc-400";

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span id="name-display-${sub.id}" onclick="enableNameEdit(${sub.id}, '${sub.name.replace(/'/g, "\\'")}')" class="font-bold text-lg cursor-pointer border-b border-dashed ${nameColor}" title="點擊修改名字">${sub.name}</span>
                        <span class="text-amber-600 dark:text-amber-500 font-mono font-bold text-xl" id="timer-${sub.id}">--:--:--</span>
                    </div>
                    
                    <div class="w-full ${isLight ? 'bg-slate-100' : 'bg-zinc-950'} h-2.5 rounded-full overflow-hidden mb-4 border ${isLight ? 'border-slate-200' : 'border-zinc-800/50'}">
                        <div id="progress-${sub.id}" class="bg-gradient-to-r from-emerald-500 to-cyan-500 h-full w-full transition-all duration-1000"></div>
                    </div>
                    
                    <div class="flex justify-between items-end text-sm">
                        <div class="${textTimeColor} space-y-1">
                            <div>出航時間：<span class="${isLight ? 'text-slate-900 font-semibold' : 'text-zinc-300'} font-mono">${sub.startTimeStr}</span></div>
                            <div>預計回港：<span class="${isLight ? 'text-emerald-700 font-bold' : 'text-emerald-400'} font-mono">${sub.endTimeStr}</span></div>
                        </div>
                        <div class="flex gap-1.5 items-center">
                            <div id="reset-group-${sub.id}" class="hidden flex items-center bg-emerald-600/10 border-2 border-emerald-600 rounded-lg overflow-hidden">
                                <button onclick="resetSubmarineTimer(${sub.id})" class="text-emerald-700 dark:text-emerald-400 hover:bg-emerald-600/20 text-xs px-2.5 py-1.5 transition font-bold border-r-2 border-emerald-600/30 cursor-pointer">重置</button>
                                <button onclick="openCustomTimeModal(${sub.id})" class="text-emerald-700 dark:text-emerald-400 hover:bg-emerald-600/20 text-xs px-1.5 py-1.5 transition font-bold cursor-pointer">▽</button>
                            </div>
                            <button onclick="deleteRecord(${sub.id})" class="border-2 ${isLight ? 'border-slate-300 bg-white text-red-600 hover:bg-slate-50 font-medium' : 'border-zinc-700 hover:bg-zinc-800 text-red-400'} text-xs px-3 py-1.5 rounded-lg transition cursor-pointer">刪除記錄</button>
                        </div>
                    </div>
                `;
                submarineList.appendChild(card);
            });
            updateAllTimers();
            updateThemeStyles(isLight ? 'light' : 'dark');
        }

        function updateAllTimers() {
            const now = Date.now();
            submarines.forEach(sub => {
                const timerEl = document.getElementById(`timer-${sub.id}`);
                const progressEl = document.getElementById(`progress-${sub.id}`);
                const resetGroupEl = document.getElementById(`reset-group-${sub.id}`);
                const isLight = document.body.classList.contains('light-mode');
                if (!timerEl) return;
                
                const remainSeconds = Math.ceil((sub.endTime - now) / 1000);
                if (remainSeconds <= 0) {
                    timerEl.innerText = "已回港";
                    timerEl.className = isLight ? "text-green-600 font-black text-xl" : "text-emerald-400 font-bold text-xl";
                    if (progressEl) progressEl.style.width = "0%";
                    if (resetGroupEl) resetGroupEl.classList.remove('hidden');
                    if (!sub.notified) { sub.notified = true; saveToStorage(); triggerNotification(sub.name); }
                } else {
                    timerEl.innerText = formatDuration(remainSeconds);
                    timerEl.className = isLight ? "text-amber-600 font-mono font-bold text-xl" : "text-amber-500 font-mono font-bold text-xl";
                    if (progressEl) {
                        progressEl.style.width = `${Math.max(0, Math.min(100, (remainSeconds / sub.maxDuration) * 100))}%`;
                    }
                    if (resetGroupEl) resetGroupEl.classList.add('hidden');
                }
            });
        }

        function triggerNotification(subName) {
            playBeepNotification();
            if (Notification.permission === "granted") { new Notification("⚓ Submerge DiveClock 回港提醒", { body: `您的潛水艇【${subName}】已經探索完畢，成功回港囉！` }); }
        }

        window.enableNameEdit = function(id, currentName) {
            const nameDisplay = document.getElementById(`name-display-${id}`); if (!nameDisplay) return;
            const isLight = document.body.classList.contains('light-mode');
            nameDisplay.innerHTML = `<input type="text" id="name-input-${id}" class="${isLight ? 'bg-white text-slate-900 border-blue-600' : 'bg-zinc-800 text-white border-emerald-500'} font-bold text-base px-2 py-0.5 rounded border-2 focus:outline-none w-48" value="${currentName}" onblur="saveName(${id})" onkeydown="if(event.key === 'Enter') saveName(${id})">`;
            const input = document.getElementById('name-input-' + id); input.focus(); input.select();
            input.addEventListener('click', (e) => e.stopPropagation());
        }

        window.saveName = function(id) {
            const input = document.getElementById('name-input-' + id); if (!input) return;
            const newName = input.value.trim() || "未命名潛水艇";
            const subIndex = submarines.findIndex(sub => sub.id === id);
            if (subIndex !== -1) submarines[subIndex].name = newName;
            saveToStorage(); renderCards();
        }

        window.deleteRecord = function(id) { submarines = submarines.filter(sub => sub.id !== id); saveToStorage(); renderCards(); }
        window.clearAllRecords = function() { if (submarines.length === 0) return; if (confirm("⚠️ 確定要清空所有紀錄嗎？")) { submarines = []; saveToStorage(); renderCards(); } }
    </script>
</body>
</html>
